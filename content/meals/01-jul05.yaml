  - name: Dinner
    title: Grab-and-Go Road Boxes
    description: "We're rolling in late and hungry, so dinner travels with us — each person gets their own box to eat between the two carloads. A wrap or sandwich (turkey, ham, or PB&J for the kids) with chips, fruit, cheese, and a cookie. GF wraps and a protein-box option keep everyone covered, with a floating cooler of waters and snacks along for the ride."
