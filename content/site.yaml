welcome_heading: The Staceys and Georges are headed to the lake.
welcome_body: >
  Three days together on Lake Michigan — sand, sunsets, and time with everyone in one
  place. This is our home base for keeping the plan straight: who's arriving when, where
  we're staying, and the running list of things we might do. Nothing's set in stone —
  add to it as ideas come.
footer_heading: See you at the lake.
footer_body: This is a living plan — add, change, and tweak as we go. Can't wait.
meal_intro: >
  Every meal is built around one idea: gluten-free by default, so the whole table eats the
  same food — gluten is only ever an optional add-on. Most meals are build-your-own, so
  everyone makes their plate exactly how they like it.
meal_notes:
  - "Gluten-free, always — the whole table eats the same thing. Wheat tortillas, crackers, and bread are set out separately as optional add-ons."
  - "A plain lane at every meal — there's always something simple (plain meat, cheese, rice, fruit) for the choosier eaters."
  - "Universal backups — PB&J and a stocked snack-and-fruit bowl stay out all week."
  - "Drink station — water, milk, juice, and lemonade all day, with coffee for the adults."
  - "Maybe a treat — s'mores by the fire pit one evening if the night's right."
